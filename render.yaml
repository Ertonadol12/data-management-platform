services:
  - type: web
    name: data-management-platform
    runtime: python
    repo: https://github.com/Ertonadol12/data-management-platform
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0